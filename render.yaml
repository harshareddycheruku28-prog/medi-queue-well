services:
  - type: web
    name: medi-queue
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NITRO_PRESET
        value: node-server
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
